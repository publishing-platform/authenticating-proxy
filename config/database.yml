default: &default
  adapter: postgresql
  encoding: unicode
  pool: 12

development:
  <<: *default
  database: authenticating_proxy_development
  url: <%= ENV["DATABASE_URL"]%>

test:
  <<: *default
  database: authenticating_proxy_test
  url: <%= ENV["TEST_DATABASE_URL"] %>

production:
  <<: *default
  database: authenticating_proxy
  url: <%= ENV["DATABASE_URL"]%>
